services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: altairika
      POSTGRES_USER: bot
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bot -d altairika"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    build: .
    restart: unless-stopped
    env_file:
      - path: .env
        required: true
    environment:
      # Перекрываем DATABASE_URL из .env: внутри Docker база доступна по имени сервиса "db"
      DATABASE_URL: postgresql+asyncpg://bot:secret@db:5432/altairika
    depends_on:
      db:
        condition: service_healthy
    command: sh scripts/entrypoint.sh

volumes:
  postgres_data:
