services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: altairika
      POSTGRES_USER: bot
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bot -d altairika"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://bot:secret@db:5432/altairika
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && python -m bot"

volumes:
  postgres_data:
