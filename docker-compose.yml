services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bot -d altairika"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    build: .
    restart: unless-stopped
    env_file:
      - path: .env
        required: true
    environment:
      # Перекрываем DATABASE_URL из .env: внутри Docker база доступна по имени сервиса "db"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    command: sh scripts/entrypoint.sh

  # Сервис синхронизации каталога с altairika.ru (запускается однократно).
  # Активируется только с профилем "with-parser":
  #   docker compose --profile with-parser up --build -d
  catalog_sync:
    build: .
    profiles: [with-parser]
    restart: "no"
    env_file:
      - path: .env
        required: true
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && python scripts/run_parser.py"

volumes:
  postgres_data:
